version: "3.8"

services:
  elasticsearch:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/arm64v8/elasticsearch:8.18.8-linuxarm64
    container_name: observability-elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
      - xpack.security.http.ssl.enabled=false
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - observability
    healthcheck:
      test: curl -s -u elastic:changeme http://localhost:9200 >/dev/null || exit 1
      interval: 30s
      retries: 3

  # Applies custom ES component templates for telemetry search optimization.
  # Runs once after ES is healthy, then exits. Use: docker compose run --rm es-init
  # For manual use in other environments: deploy/observability/init-es.sh <es-url>
  es-init:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/arm64v8/elasticsearch:8.18.8-linuxarm64
    container_name: observability-es-init
    entrypoint: ["/bin/bash", "/tmp/init-es.sh", "http://elasticsearch:9200", "-u", "elastic:changeme"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - observability
    volumes:
      - ./init-es.sh:/tmp/init-es.sh:ro
    profiles:
      - init

  kibana:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.elastic.co/kibana/kibana:8.18.8-linuxarm64
    container_name: observability-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=AAEAAWVsYXN0aWMva2liYW5hL3Rva2VuXzFBMmFhNThCZ3pxd0Z2RmI0blNrOlN4dHAwcWZyVE5Xd053cGRBcFNMekE
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=b8e7a9f4c1d23e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9
      - XPACK_SECURITY_ENCRYPTIONKEY=c9f0b1a2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9
      - XPACK_REPORTING_ENCRYPTIONKEY=d0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      - SERVER_PUBLICBASEURL=http://localhost:5601
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - observability

  otel-collector:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.148.0-linuxarm64
    container_name: observability-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - observability

volumes:
  elasticsearch_data:

networks:
  observability:
    driver: bridge
